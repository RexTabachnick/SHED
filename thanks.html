<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in — Third Space</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #FFF8F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 60px 48px;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }
    .emoji { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 32px; font-weight: 900; color: #1A1A2E; letter-spacing: -1px; margin-bottom: 16px; }
    p { font-size: 17px; color: #3D3D5C; line-height: 1.65; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: #FF6B5B;
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #E85547; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>You're on the list!</h1>
    <p>We'll reach out soon with cohort options near you. In the meantime, think about which activity excites you most.</p>
    <a href="index.html">← Back to Third Space</a>
  </div>
</body>
</html>
